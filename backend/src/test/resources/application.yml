spring:
  datasource:
    url: jdbc:h2:mem:aurabloom;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-jwt-signing-123456
    access-token-minutes: 60
    refresh-token-days: 30
  mail:
    enabled: false
  bootstrap:
    create-default-admin: true
    admin-email: admin@aurabloom.test
    admin-password: Admin123!
    admin-name: Test Admin
